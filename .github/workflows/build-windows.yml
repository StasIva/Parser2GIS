name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller>=6.0
          pip install -e .

      - name: Test PyInstaller (hello world)
        id: test
        shell: pwsh
        run: |
          Set-Content -Path test_hello.py -Value 'print("hello world")'
          python -m PyInstaller --onedir --name test_hello test_hello.py 2>&1
          if ($LASTEXITCODE -ne 0) { throw "PyInstaller basic test failed" }

      - name: Clean
        shell: pwsh
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          if (Test-Path build) { Remove-Item -Recurse -Force build }

      - name: Run unit tests
        shell: pwsh
        continue-on-error: true
        run: |
          pip install pytest pytest-mock
          python -m pytest tests/ -v 2>&1
          $testExit = $LASTEXITCODE
          if ($testExit -ne 0) { Write-Host "::warning::Unit tests failed with exit code $testExit (non-fatal)" }

      - name: Build project
        id: build
        shell: pwsh
        run: |
          python -m PyInstaller parser2gis.spec --noconfirm 2>&1
          if ($LASTEXITCODE -ne 0) { throw "Project build failed" }

      - name: Embed Windows resources
        shell: pwsh
        run: |
          $rcPath = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\*\bin\Hostx64\x64\rc.exe" -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
          if ($rcPath -and (Test-Path "parser2gis/assets/parser2gis.rc")) {
            & $rcPath /fo parser2gis/assets/parser2gis.res parser2gis/assets/parser2gis.rc
            Copy-Item parser2gis/assets/parser2gis.res dist/parser2gis/ -ErrorAction SilentlyContinue
            Write-Host "Windows resources embedded successfully"
          } else {
            Write-Host "RC compiler not found or .rc file missing - skipping resource embedding"
          }

      - name: Smoke test artifact
        shell: pwsh
        run: |
          $artPath = "dist/parser2gis/"
          if (-not (Test-Path $artPath)) { throw "Artifact directory missing" }
          $exePath = Join-Path $artPath "parser2gis.exe"
          if (-not (Test-Path $exePath)) { throw "Executable missing at $exePath" }
          $size = (Get-Item $exePath).Length
          Write-Host "parser2gis.exe size: $($size / 1MB) MB"
          if ($size -lt 1MB) { throw "Executable too small ($size bytes)" }
          $files = @(Get-ChildItem -Recurse -File $artPath)
          Write-Host "Artifact contains $($files.Count) files"
          $files | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Smoke test — CLI execution
        shell: pwsh
        run: |
          $exePath = "dist/parser2gis/parser2gis.exe"
          $tmpDir = Join-Path $env:RUNNER_TEMP "smoke_test_data"
          New-Item -ItemType Directory -Force -Path $tmpDir | Out-Null

          function Run-Exe($args) {
            $p = Start-Process -FilePath $exePath -ArgumentList $args -NoNewWindow -Wait -PassThru -RedirectStandardOutput "$tmpDir\stdout.txt" -RedirectStandardError "$tmpDir\stderr.txt"
            $rc = $p.ExitCode
            $out = Get-Content "$tmpDir\stdout.txt" -Raw
            $err = Get-Content "$tmpDir\stderr.txt" -Raw
            if ($rc -ne 0) {
              Write-Host "STDOUT: $out"
              Write-Host "STDERR: $err"
              throw "Exit code $rc for: parser2gis.exe $args"
            }
            return $out
          }

          # 1. --version
          Write-Host "=== 1. --version ==="
          $v = Run-Exe @("--version")
          if ($v -notmatch "parser2gis") { throw "Unexpected version output" }

          # 2. seed (initializes DB, runs migrations, inserts seed data)
          Write-Host "=== 2. seed ==="
          $s = Run-Exe @("seed")
          if ($s -notmatch "seeded") { throw "Seed output unexpected" }

          # 3. list cities (expect 3 seeded cities)
          Write-Host "=== 3. list cities ==="
          $c = Run-Exe @("list", "cities")
          if ($c -notmatch "Москва") { throw "Expected Москва in city list" }
          if ($c -notmatch "Санкт-Петербург") { throw "Expected Санкт-Петербург in city list" }
          if ($c -notmatch "Новосибирск") { throw "Expected Новосибирск in city list" }

          # 4. list rubrics (expect 10 seeded rubrics)
          Write-Host "=== 4. list rubrics ==="
          $r = Run-Exe @("list", "rubrics")
          if ($r -notmatch "Авто") { throw "Expected rubric in list" }

          # 5. list tasks (expect empty, but no crash)
          Write-Host "=== 5. list tasks ==="
          $t = Run-Exe @("list", "tasks")
          if ($t -ne "") { Write-Host "Tasks (expected empty): $t" }

          # 6. export (create a dummy org first via export with --task-id 0)
          #    Skip export if no orgs exist — it exits with code 1
          Write-Host "=== 6. export (via --task-id 0, expects no orgs) ==="
          $outFile = "$tmpDir\test_export.xlsx"
          $p = Start-Process -FilePath $exePath -ArgumentList @("export", "--task-id", "0", "--output", $outFile) -NoNewWindow -Wait -PassThru -RedirectStandardOutput "$tmpDir\export_out.txt" -RedirectStandardError "$tmpDir\export_err.txt"
          $rc = $p.ExitCode
          $exportOut = Get-Content "$tmpDir\export_out.txt" -Raw
          $exportErr = Get-Content "$tmpDir\export_err.txt" -Raw
          if ($rc -ne 0) {
            Write-Host "Export exit code $rc (expected if no orgs exist): $exportOut$exportErr"
          }

          Write-Host ""
          Write-Host "=== All CLI smoke tests passed ==="

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser2gis-windows
          path: dist/parser2gis/
