name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller>=6.0
          pip install -e .

      - name: Quick sanity check
        shell: python
        run: |
          import sys
          print(f'Python {sys.version}')
          import pyinstaller; print(f'PyInstaller OK')
          import parser2gis; print(f'parser2gis OK')
          import httpx; print(f'httpx OK')
          import openpyxl; print(f'openpyxl OK')
          import pydantic; print(f'pydantic OK')
          try:
              from PySide6 import QtWidgets; print('PySide6.QtWidgets OK')
          except Exception as e:
              print(f'PySide6 import failed: {e}')

      - name: Test basic PyInstaller functionality
        id: test_basic
        shell: cmd
        run: |
          echo print("hello world") > test_hello.py
          pyinstaller --onefile --name test_hello test_hello.py > test_basic.log 2>&1
          type test_basic.log
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
        continue-on-error: true

      - name: Clean previous build artifacts
        run: |
          if exist dist ( rmdir /s /q dist )
          if exist build ( rmdir /s /q build )
        shell: cmd

      - name: Build project with PyInstaller
        id: build
        shell: cmd
        run: |
          pyinstaller parser2gis.spec --noconfirm --log-level DEBUG > pyinstaller_build.log 2>&1
          type pyinstaller_build.log
          if %ERRORLEVEL% NEQ 0 exit /b %ERRORLEVEL%
        continue-on-error: true

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            test_basic.log
            pyinstaller_build.log

      - name: Embed Windows resources
        shell: pwsh
        run: |
          if (Test-Path "parser2gis/assets/parser2gis.rc") {
            & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\*\bin\Hostx64\x64\rc.exe" /fo parser2gis/assets/parser2gis.res parser2gis/assets/parser2gis.rc
            copy parser2gis/assets/parser2gis.res dist/parser2gis/
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser2gis-windows
          path: dist/parser2gis/
