name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller>=6.0
          pip install -e .

      - name: Build with PyInstaller (via script)
        id: build_script
        run: python scripts/build.py
        continue-on-error: true

      - name: Debug - direct pyinstaller
        if: always()
        run: |
          pyinstaller parser2gis.spec --noconfirm > pyinstaller_direct.log 2>&1
          type pyinstaller_direct.log
        continue-on-error: true

      - name: Collect build logs
        if: always()
        run: |
          echo "=== build_script outcome: ${{ steps.build_script.outcome }} ===" > all_build_logs.txt
          if exist dist\* ( dir /s dist >> all_build_logs.txt 2>&1 )
          if exist build\* ( dir /s build >> all_build_logs.txt 2>&1 )
          if exist pyinstaller_direct.log ( type pyinstaller_direct.log >> all_build_logs.txt 2>&1 )
        shell: cmd
        continue-on-error: true

      - name: Upload log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            pyinstaller_direct.log
            all_build_logs.txt

      - name: Fail workflow if build failed
        if: steps.build_script.outcome == 'failure'
        run: exit 1

      - name: Embed Windows resources
        shell: pwsh
        run: |
          if (Test-Path "parser2gis/assets/parser2gis.rc") {
            & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\*\bin\Hostx64\x64\rc.exe" /fo parser2gis/assets/parser2gis.res parser2gis/assets/parser2gis.rc
            copy parser2gis/assets/parser2gis.res dist/parser2gis/
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser2gis-windows
          path: dist/parser2gis/
