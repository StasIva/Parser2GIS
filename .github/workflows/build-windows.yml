name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller>=6.0
          pip install -e .

      - name: Clean previous build artifacts
        run: |
          if exist dist ( rmdir /s /q dist )
          if exist build ( rmdir /s /q build )
        shell: cmd

      - name: Run pyinstaller directly (debug)
        id: build
        shell: cmd
        run: |
          pyinstaller parser2gis.spec --noconfirm --log-level DEBUG > pyinstaller_debug.log 2>&1
          set EXITCODE=%ERRORLEVEL%
          type pyinstaller_debug.log
          if %EXITCODE% NEQ 0 exit /b %EXITCODE%
        continue-on-error: true

      - name: Upload debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyinstaller-debug-log
          path: pyinstaller_debug.log

      - name: Fail if build failed
        if: steps.build.outcome == 'failure'
        run: exit 1

      - name: Embed Windows resources
        shell: pwsh
        run: |
          if (Test-Path "parser2gis/assets/parser2gis.rc") {
            & "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Tools\MSVC\*\bin\Hostx64\x64\rc.exe" /fo parser2gis/assets/parser2gis.res parser2gis/assets/parser2gis.rc
            copy parser2gis/assets/parser2gis.res dist/parser2gis/
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser2gis-windows
          path: dist/parser2gis/
